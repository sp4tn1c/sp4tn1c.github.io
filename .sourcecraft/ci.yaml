on:
  push:
    - workflows: build-mkdocs
      filter:
        branches: ["main"]

workflows:
  build-mkdocs:
    tasks:
      - name: build-and-deploy
        cubes:
          - name: mkdocs-build
            image: python:3.11-slim
            script:
              - pip install mkdocs mkdocs-material
              - mkdocs build --clean
              - mkdir -p release-site
              - cp -r site/* release-site/
