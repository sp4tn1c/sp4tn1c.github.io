on:
  push:
    - workflows: build-site
      filter:
        branches: ["main"]
workflows:
  build-site:
    tasks:
      - name: build-and-publish-docs
        cubes:
          - name: build-mkdocs-docs
            image: docker.io/library/python:3.14-slim
            script:
              - python -m pip install --upgrade pip
              - pip install mkdocs mkdocs-material
              - cd src
              - mkdocs build --clean -d ../docs
              - ls -la ../docs
